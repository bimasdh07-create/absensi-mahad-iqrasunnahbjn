<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi Ma'had Iqrasunnah Bojonegoro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #f4f1f7 0%, #e9e3f0 100%); color: #2d3748; display: flex; flex-direction: column; min-height: 100vh; padding: 24px; }
        .container { width: 100%; max-width: 480px; margin: auto; background: #ffffff; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(106, 27, 154, 0.08); border-top: 5px solid #6a1b9a; }
        .header-lembaga { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed #cbd5e1; }
        .header-lembaga h1 { font-size: 1.3rem; color: #4a148c; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.4; }
        .waktu-widget { background-color: #f3e5f5; padding: 12px; border-radius: 8px; margin-bottom: 25px; text-align: center; font-size: 0.9rem; color: #6a1b9a; font-weight: 600; border: 1px solid rgba(106, 27, 154, 0.1); line-height: 1.5; }
        
        .perangkat-widget { background-color: #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.85rem; color: #4a5568; font-weight: 600; border: 1px solid #cbd5e1; }
        .perangkat-locked { background-color: #d1fae5; color: #065f46; border-color: #a7f3d0; }

        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; font-size: 0.85rem; color: #4a5568; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; color: #2d3748; background-color: #f8fafc; transition: all 0.2s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #8e24aa; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(142, 36, 170, 0.15); }
        input:disabled, select:disabled { background-color: #edf2f7; color: #718096; cursor: not-allowed; border-color: #e2e8f0; }
        
        .tipe-absen-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tipe-absen-container label { flex: 1; margin-bottom: 0; }
        .radio-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #e2e8f0; border-radius: 8px; padding: 10px; cursor: pointer; background-color: #f8fafc; font-weight: 600; font-size: 0.9rem; transition: all 0.2s ease; text-align: center; }
        .tipe-absen-container input[type="radio"] { display: none; }
        .tipe-absen-container input[type="radio"]:checked + .radio-tile { border-color: #6a1b9a; background-color: #f3e5f5; color: #6a1b9a; }
        textarea { resize: none; height: 80px; }
        
        .btn-submit { width: 100%; padding: 14px; background-color: #6a1b9a; color: #ffffff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(106, 27, 154, 0.2); }
        .btn-submit:hover { background-color: #4a148c; transform: translateY(-1px); }

        /* Panel Admin TU Style */
        .admin-box { margin-top: 25px; padding: 20px 0 0 0; border-top: 2px dashed #cbd5e1; }
        .admin-nav { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-admin-nav { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; background-color: #cbd5e1; color: #4a5568; }
        .btn-admin-nav.active { background-color: #16a085; color: white; }
        .panel-konten { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 10px; display: none; }

        .footer { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #a0aec0; }
        @media (max-width: 480px) { body { padding: 12px; } .container { padding: 24px 20px; border-radius: 12px; } .header-lembaga h1 { font-size: 1.1rem; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-lembaga">
        <h1>Ma'had Iqrasunnah Bojonegoro</h1>
    </div>

    <div class="waktu-widget">
        <div id="waktu-realtime">Memuat waktu...</div>
        <div id="periode-otomatis" style="font-size: 0.8rem; margin-top: 5px; color: #8e24aa;"></div>
    </div>

    <!-- Widget Info Kunci HP Mandiri -->
    <div class="perangkat-widget" id="status-perangkat">
        Memeriksa Otoritas Perangkat HP...
    </div>
    
    <!-- FORM UTAMA GURU (MANDIRI) -->
    <form id="formAbsensi" onsubmit="kirimDataAbsen(event)">
        <label>Jenis Pelaporan Hari Ini</label>
        <div class="tipe-absen-container">
            <label>
                <input type="radio" name="tipe_kehadiran" value="Kehadiran" checked onchange="pilihTipePelaporan()">
                <div class="radio-tile">Hadir Mengajar</div>
            </label>
            <label>
                <input type="radio" name="tipe_kehadiran" value="Izin" onchange="pilihTipePelaporan()">
                <div class="radio-tile">Izin Syar'i</div>
            </label>
            <label>
                <input type="radio" name="tipe_kehadiran" value="Sakit" onchange="pilihTipePelaporan()">
                <div class="radio-tile">Sakit</div>
            </label>
        </div>

         <div class="form-group">
            <label for="nama">Pilih Nama Anda</label>
            <select id="nama" required>
                <option value="" disabled selected>-- Pilih Nama Anda --</option>
                <option value="SAIDI, M.Pd">SAIDI, M.Pd</option>
                <option value="ADY MUHIBBUDDIN, S.T">ADY MUHIBBUDDIN, S.T</option>
                <option value="IMAM SYAFI'I, S.Pd">IMAM SYAFI'I, S.Pd</option>
                <option value="M. EDI SANTOSO, S.M">M. EDI SANTOSO, S.M</option>
                <option value="MOCH. SULTON ULUM BIMASDHOM, S.Pd">MOCH. SULTON ULUM BIMASDHOM, S.Pd</option>
                <option value="NURILROCHMATIN, M.Pd">NURILROCHMATIN, M.Pd</option>
                <option value="HETI PUJI LESTARI, S.Pd">HETI PUJI LESTARI, S.Pd</option>
                <option value="FATHIMAH, S.Pd">FATHIMAH, S.Pd</option>
                <option value="AMILATUR ROFIAH">AMILATUR ROFIAH</option>
                <option value="IKE ROHMAWATI, S.TP">IKE ROHMAWATI, S.TP</option>
                <option value="SITI RODHIYAH, S.Pd">SITI RODHIYAH, S.Pd</option>
                <option value="NURUL FITRIYA R, S.H">NURUL FITRIYA R, S.H</option>
                <option value="ADINDA ELSA SABILA">ADINDA ELSA SABILA</option>
                <option value="HASNA NAJLA HANIFAH">HASNA NAJLA HANIFAH</option>
                <option value="JANIA PUTRI SALEHA">JANIA PUTRI SALEHA</option>
                <option value="JAZILAH">JAZILAH</option>
                <option value="OKTAVIA NUR R.">OKTAVIA NUR R.</option>
                <option value="IZZATUL UMMAH">IZZATUL UMMAH</option>
                <option value="ELSYA NUR HASANAH">ELSYA NUR HASANAH</option>
            </select>
        </div>

        <div class="form-group" id="grup-status-hadir">
            <label for="status_waktu">Waktu Absensi</label>
            <select id="status_waktu">
                <option value="Masuk">Absen Masuk Kelas</option>
                <option value="Pulang">Absen Pulang / Selesai Kelas</option>
            </select>
        </div>

        <div class="form-group" id="grup-keterangan" style="display: none;">
            <label for="keterangan">Alasan / Keterangan Ketidakhadiran</label>
            <textarea id="keterangan" placeholder="Tuliskan keterangan detail terkait udzur syar'i..."></textarea>
        </div>

        <button type="submit" class="btn-submit" id="tombolKirim">Kirim Absensi</button>
    </form>

    <!-- ==================== PANEL MENU UTAMA TU ==================== -->
    <div class="admin-box">
        <div class="admin-nav">
            <button class="btn-admin-nav" onclick="bukaFiturLaporan()">📂 Cetak Rekap</button>
            <button class="btn-admin-nav" onclick="bukaFiturResetHP()">🔄 Reset HP Guru</button>
            <button class="btn-admin-nav" id="nav-tu" onclick="bukaPanelTU()">💻 Input Manual TU</button>
        </div>

        <!-- Form Konten Khusus Input Manual Staf TU -->
        <div class="panel-konten" id="panel-input-tu">
            <h3 style="font-size: 0.95rem; margin-bottom: 15px; color: #16a085; text-align: center;">Form Input Manual Tata Usaha (TU)</h3>
            <form id="formTU" onsubmit="kirimAbsenManualTU(event)">
                <div class="form-group">
                    <label for="tu_nama">Pilih Nama Ustadz / Ustadzah</label>
                    <input type="text" id="tu_nama" required placeholder="Contoh: Ustadz Abu Bakar">
                </div>
                <div class="form-group">
                    <label for="tu_status">Status</label>
                    <select id="tu_status" onchange="aturFormKeteranganTU()">
                        <option value="Hadir-Masuk">Hadir (Absen Masuk)</option>
                        <option value="Hadir-Pulang">Hadir (Absen Pulang)</option>
                        <option value="Izin">Izin (Syar'i)</option>
                        <option value="Sakit">Sakit</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tu_keterangan">Keterangan Tambahan</label>
                    <input type="text" id="tu_keterangan" value="Diinput manual oleh TU (HP Tertinggal/Trouble)" placeholder="Alasan diinput manual oleh TU">
                </div>
                <button type="submit" class="btn-print" style="padding: 12px; font-size: 0.9rem;">Simpan Absen Guru via TU</button>
            </form>
        </div>
    </div>
</div>

<div class="footer">
    © 2026 Ma'had Iqrasunnah Bojonegoro. All Rights Reserved.
</div>

<script src="script.js"></script>
</body>
</html>
